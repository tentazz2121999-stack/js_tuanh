<!doctype html>
<html lang="en">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->

    <script src="scripts.js"></script>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>

<body>
    <div class="row" id="product-list">

    </div>
    <button class="btn btn-primary" id="loadmore" onclick="showmore()">Xem thêm</button>
    <div id="loading"></div>
    <script>
        var products = [];
        var currentindex = 0;
        var step = 3;
        var html = "";
        window.onload = function () {
            loadProducts();
        }

        function loadProducts() {
            let xhr = new XMLHttpRequest();
            xhr.open("GET", "products.json", true);
            xhr.onload = function () {
                if (xhr.status === 200) {
                    products = JSON.parse(this.responseText);
                    showproducts();
                }
            }
            xhr.send();
        }

        function showproducts(){
            let nextindex = currentindex + step;
            let list = products.slice(currentindex, nextindex);
            list.forEach(product => {
                html += `
            <div class="col-md-3">
                <div class="card mb-3">
                    <img src="${product.image}" class="card-img-top" alt="${product.name}">
                    <div class="card-body">
                        <h5 class="card-title">${product.name}</h5>
                        <p class="card-text">${product.price} VND</p>
                    </div>
                </div>
            </div>
            `;
            });
            document.getElementById("product-list").innerHTML = html;
            currentindex = nextindex;
        }

        function showmore(){
            document.getElementById("loading").innerHTML = "<img src='loading.gif' alt='Loading...'>";
            document.getElementById("loadmore").disabled = true;
            
            setTimeout(function(){
                showproducts();

                document.getElementById("loading").innerHTML = "";
                document.getElementById("loadmore").disabled = false;

                console.log(currentindex);
                console.log(currentindex >= products.length)

                if(currentindex >= products.length){
                    document.getElementById("loadmore").style.display = "none";
                    document.getElementById("loading").innerHTML += "<p>Đã hết sản phẩm để hiển thị</p>";
                }
            }, 2000);
        }
    </script>


    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>

</html>
