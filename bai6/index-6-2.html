<!doctype html>
<html lang="en">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <script src="scripts.js"></script>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>

<body>

    <h3 id="message">Chào mọi người</h3>
    <button onclick="doimau()">Đổi màu</button>
    <button onclick="innoidung()">in nội dung</button>
    <button onclick="innoidungcu()">in nội dung cũ</button>

    <button onclick="phepnhan()">thực hiện phép nhân</button>
    <input type="number" id="a" placeholder="Nhập số a">
    <input type="number" id="b" placeholder="Nhập số b">
    <p id="result"></p>
    <script>


        function phepnhan() {
            let a = document.getElementById("a").value;
            let b = document.getElementById("b").value;
            let result = a * b;
            document.getElementById("result").innerHTML = "Kết quả phép nhân: " + result;
        }

        function doimau() {
            let message = document.getElementById("message");
            if (message.style.color === "red") {
                message.style.color = "blue";
            } else {
                message.style.color = "red";
            }
        }

        function innoidung() {
            let message = document.getElementById("message").innerHTML = "Chào tất cả mọi người";
            console.log(message);
        }

        function innoidungcu() {
            let message = document.getElementById("message").innerHTML = "Chào mọi người";
            console.log(message);
        }
    </script>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>

</html>
