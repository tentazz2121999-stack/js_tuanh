<!doctype html>
<html lang="en">
  <head>
    <title>bài 2-4</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        th{
            background-color: #D6EEEE;

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="container-fluid">
        <table class="table" width="100%">
            <thead >
                <tr>
                    <th class="textCenter" style="width: 30%;">Component</th>
                    <th style="width: 70%;">Display</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="textCenter">Input text</td>
                    <td>
                        <input type="text" name="iptext" id="iptext">
                    </td>
                    
                </tr>
                <tr>
                    <td class="textCenter">Text area</td>
                    <td>
                        <textarea name="textArea" id="textArea">Text</textarea>
                    </td>
                    
                </tr>
                <tr>
                    <td class="textCenter">Button</td>
                    <td>
                        <button type="button" class="btn btn-primary">Click me</button>
                    </td>
                </tr>
                <tr>
                    <td class="textCenter">Radio</td>
                    <td>
                        <input type="radio" name="opt" id="opt" value="1" checked>Option 1 <br>
                        <input type="radio" name="opt" id="opt" value="2">Option 2 <br>
                        <input type="radio" name="opt" id="opt" value="3">Option 3
                    </td>
                </tr>
                <tr>
                    <td class="textCenter">Multiple selection</td>
                    <td>
                        <input type="checkbox" name="checkbox" id="">Option 1 <br>
                        <input type="checkbox" name="checkbox" id="" checked>Option 2 <br>
                        <input type="checkbox" name="checkbox" id="">Option 3
                    </td>
                </tr>
                <tr>
                    <td class="textCenter">Dropdown</td>
                    <td>
                        <select name="" id="">
                            <option value="1" selected>Option 1</option>
                            <option value="2">Option 2</option>
                            <option value="3">Option 3</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td class="textCenter">File select</td>
                    
                    <td>
                        <input type="file" name="" id="">
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  </body>
</html>
