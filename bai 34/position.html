<!doctype html>
<html lang="en">
  <head>
    <title>position</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <style>
        body{
            height: 2000px;
            padding-top: 70px;
            margin: 0;
        }
        nav ul{
            position: fixed;
            list-style: none;
            display: flex;
            top: 0;
            left: 0;
            width: 100%;
            background-color: white;
            padding: 10px;
            z-index: 1000;
        }
        h2{
            margin-top: 60px;
        }
        nav ul li{
            margin-right: 10px;
        }
        .box-static{
            position: static;
            width: 100px;
            border: 1px solid black;
            /* height: 200px; */
            /* background-color: red; */
        }
        .box-relative{
            position: relative;
            width: 100px;
            border: 1px solid black;
            /* height: 100px; */
            /* background-color: blue; */
            top: 20px;
            left: 30px;
        }
        .box-scroll-top{
            position: relative;
            width: 70px;
            height: 70px;
            background-color: green;
            position: fixed;
            top: 80%;
            left: 80%;
        }
    </style>
    <link rel="stylesheet" href="./css/style-flex.css">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  </head>
  <body>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="position.html">Position</a></li>
                <li><a href="display.html">Display</a></li>
            </ul>
        </nav>
        <h2>Position</h2>
        <div class="box-static">Box static</div>
        <div class="box-relative">Box relative</div>
        
        <div style="height: 1000px;"></div>
        
        <div class="box-scroll-top" >Box scroll top</div>
        
        <h2>Flex demo</h2>
        <div class="container-1">
                <div class="box-1" >Box 1</div>
                <div class="box-1" >Box 2</div>
                <div class="box-1" >Box 3</div>
        </div>

        <div class="container-2">
                <div class="box-2" >Box 1</div>
                <div class="box-2" >Box 2</div>
                <div class="box-2" >Box 3</div>
        </div>

        <div class="container-3">
            <div class="box">Center</div>
        </div>

        <div class="container-4">
                <div class="box-4" >Box 1</div>
                <div class="box-4" >Box 2</div>
                <div class="box-4" >Box 3</div>
                <div class="box-4" >Box 4</div>
                <div class="box-4" >Box 5</div>
                <div class="box-4" >Box 6</div>
        </div>

        <script>
            const boxScrollTop = document.querySelector('.box-scroll-top');
            boxScrollTop.addEventListener('click', function(){
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        </script>
    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
  </body>
</html>
